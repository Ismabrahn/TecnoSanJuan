<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Tecno San Juan</title>
  <link rel="stylesheet" href="css/login.css">
  <script type="module" src="js/auth.js" defer></script>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-header">
        <h1>Tecno San Juan</h1>
        <p>Panel de Administración</p>
      </div>
      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email" placeholder="admin@tecnosanjuan.com">
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
        </div>
        <div id="loginError" class="login-error hidden"></div>
        <button type="submit" id="loginBtn" class="btn btn-primary btn-block">Iniciar Sesión</button>
      </form>
    </div>
  </div>
</body>
</html>
